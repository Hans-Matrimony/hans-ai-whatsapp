version: "3.8"

services:
  whatsapp-webhook:
    build: .
    container_name: hans-ai-whatsapp
    ports:
      - "8003:8003"
    environment:
      - WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN}
      - WHATSAPP_PHONE_ID=${WHATSAPP_PHONE_ID}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN}
      - OPENCLAW_URL=${OPENCLAW_URL}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - MONGO_LOGGER_URL=${MONGO_LOGGER_URL}
      - MEM0_URL=${MEM0_URL:-https://rg4g0gkk0wwkk4cc00g4sg0c.api.hansastro.com}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - LOG_LEVEL=info
    depends_on:
      - redis
      - celery-worker
    networks:
      - hans-ai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery-worker:
    build: .
    container_name: hans-ai-celery-worker
    command: celery -A app.services.celery_app worker --loglevel=info --concurrency=4
    environment:
      - WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN}
      - WHATSAPP_PHONE_ID=${WHATSAPP_PHONE_ID}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN}
      - OPENCLAW_URL=${OPENCLAW_URL}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - MONGO_LOGGER_URL=${MONGO_LOGGER_URL}
      - MEM0_URL=${MEM0_URL:-https://rg4g0gkk0wwkk4cc00g4sg0c.api.hansastro.com}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - LOG_LEVEL=info
    depends_on:
      - redis
    networks:
      - hans-ai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "celery", "-A", "app.services.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery-beat:
    build: .
    container_name: hans-ai-celery-beat
    command: celery -A app.services.celery_app beat --loglevel=info
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN}
      - WHATSAPP_PHONE_ID=${WHATSAPP_PHONE_ID}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN}
      - MONGO_LOGGER_URL=${MONGO_LOGGER_URL}
      - MEM0_URL=${MEM0_URL:-https://rg4g0gkk0wwkk4cc00g4sg0c.api.hansastro.com}
      - LOG_LEVEL=info
    depends_on:
      - redis
      - celery-worker
    networks:
      - hans-ai-network
    restart: unless-stopped

  flower:
    image: mher/flower:latest
    container_name: hans-ai-flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    networks:
      - hans-ai-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hans-ai-redis-whatsapp
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hans-ai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  hans-ai-network:
    driver: bridge

volumes:
  redis_data:
